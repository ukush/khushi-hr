databases:
  - name: khushi-hr-db
    plan: free
    databaseName: khushi_hr
    user: khushi_hr

services:
  - type: web
    name: khushi-hr
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: khushi-hr-db
          property: connectionString
      - key: ADMIN_JWT_SECRET
        generateValue: true
